name: Update Linear Dashboard

on:
  schedule:
    # Ejecutar todos los días a las 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate dashboard
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          echo "🔄 Generando dashboard desde Linear..."
          python3 generate_unified_dashboard.py
          if [ $? -eq 0 ]; then
            echo "✅ Dashboard generado exitosamente"
          else
            echo "❌ Error al generar dashboard"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Verificar si hay cambios en index.html
          if git diff --quiet index.html; then
            echo "✅ Dashboard sin cambios - no hay actualizaciones necesarias"
          else
            echo "📝 Detectados cambios en el dashboard, actualizando..."
            git add index.html
            git commit -m "🤖 Actualizar dashboard - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✅ Dashboard actualizado y pusheado a GitHub"
          fi
