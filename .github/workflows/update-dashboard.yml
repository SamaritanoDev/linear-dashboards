name: Update Linear Dashboard

on:
  schedule:
    # Ejecutar todos los días a las 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate dashboard
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: python generate_dashboard.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Solo hacer commit si hay cambios
          if git diff --quiet; then
            echo "✅ No hay cambios en el dashboard"
          else
            echo "📝 Actualizando dashboard..."
            git add index.html
            git commit -m "🤖 Actualizar dashboard - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ Dashboard actualizado y pusheado"
          fi
