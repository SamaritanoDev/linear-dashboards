<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Issues CE - Continuity Engineering Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#7dd3fc",
                        "outline": "#70787d",
                        "background": "#fdfcff",
                        "surface": "#f9f9fc",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#40484c",
                        "surface-container": "#f0f1f4",
                        "tertiary": "#6b528d"
                    }
                }
            }
        };
    </script>
    <style data-purpose="layout-and-theme">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfcff;
            color: #191c1e;
        }
        .glacier-surface {
            background-color: #f0f1f4;
            border: 1px solid rgba(112, 120, 125, 0.2);
        }
        /* Dark Mode */
        .dark {
            background-color: #0a0e1a;
            color: #e0e8f0;
        }
        .dark body {
            background-color: #0a0e1a;
        }
        .dark .glacier-surface {
            background-color: #0f1524;
            border: 1px solid rgba(74, 96, 112, 0.3);
        }
        .dark .text-on-surface { color: #e0e8f0; }
        .dark .text-on-surface-variant { color: #a0b4c4; }
    </style>
</head>
<body class="min-h-screen bg-background text-on-surface">
    <div class="min-h-screen flex flex-col">
        <header class="glacier-surface border-b border-outline-variant p-6">
            <div class="max-w-6xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                        <span class="material-symbols-outlined text-primary text-3xl">home</span>
                        <span class="text-sm text-on-surface-variant">Volver</span>
                    </a>
                </div>
                <h1 class="text-3xl font-bold text-on-surface flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">bug_report</span>
                    Issues CE
                </h1>
                <button id="theme-toggle" class="glacier-surface px-4 py-2 rounded-xl border border-primary/20 flex items-center gap-2 text-sm cursor-pointer hover:border-primary/40 transition-all" title="Cambiar tema">
                    <span class="material-symbols-outlined text-primary" id="theme-icon">light_mode</span>
                </button>
            </div>
        </header>

        <main class="flex-1 p-8 lg:p-12">
            <div class="max-w-6xl mx-auto">
                <div class="flex items-center gap-2 mb-8 overflow-x-auto pb-2">
            <button data-month="Enero" class="px-4 py-2 rounded-lg border border-outline-variant transition-all text-on-surface-variant font-medium">Enero</button>
            <button data-month="Febrero" class="px-4 py-2 rounded-lg border border-outline-variant transition-all text-on-surface-variant font-medium">Febrero</button>
            <button data-month="Marzo" class="px-4 py-2 rounded-lg border border-outline-variant transition-all text-on-surface-variant font-medium">Marzo</button>
            <button data-month="Abril" class="px-4 py-2 rounded-lg border border-outline-variant transition-all text-on-surface-variant font-medium">Abril</button>
            <button data-month="Mayo" class="px-4 py-2 rounded-lg border border-outline-variant transition-all text-primary bg-primary/10 border-primary/30 shadow-lg shadow-primary/5 font-semibold">Mayo</button>
                </div>

                <div class="glacier-surface p-8 rounded-2xl">
                    <div class="text-center text-on-surface-variant py-12"><p>Contenido de Issues CE en desarrollo</p></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Theme toggle
        const toggleTheme = () => {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeUI();
        }

        const updateThemeUI = () => {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').textContent = isDark ? 'dark_mode' : 'light_mode';
        }

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeUI();

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    </script>
</body>
</html>
